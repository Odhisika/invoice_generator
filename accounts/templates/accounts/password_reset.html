{% extends 'accounts/base.html' %}

{% block title %}Password Reset - LuckyTech Innovation Ground{% endblock %}

{% block content %}
<div class="auth-icon mb-4">
    <i class="bi bi-shield-lock"></i>
</div>

<h4 class="text-center mb-1 text-dark fw-bold">Reset Password</h4>
<p class="text-muted text-center mb-4 small">
    Enter your registered email address to receive a reset link.
</p>

<form method="post" class="needs-validation" novalidate>
    {% csrf_token %}
    <div class="mb-4">
        <label for="{{ form.email.id_for_label }}" class="form-label small fw-bold text-muted">Email Address</label>
        <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" name="{{ form.email.name }}" id="{{ form.email.id_for_label }}"
                required placeholder="e.g. name@company.com">
        </div>
    </div>
    <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary py-2 fw-bold">Send Reset Link</button>
    </div>
</form>

<div class="text-center mt-4">
    <a href="{% url 'accounts:login' %}" class="text-decoration-none small fw-bold" style="color: var(--charcoal);">
        <i class="bi bi-arrow-left me-1"></i>Back to Sign In
    </a>
</div>
{% endblock %}
