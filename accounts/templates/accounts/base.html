<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LuckyTech Receipt Generator{% endblock %}</title>
    {% load static %}
    <link href="{% static 'images/favicon.ico' %}" rel="shortcut icon" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-gold: #c5a028;
            --light-gold: #fcf6ba;
            --dark-gold: #8e6e1d;
            --primary-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 75%, #aa771c 100%);
            --mesh-gradient:
                radial-gradient(at 0% 0%, hsla(45, 20%, 10%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(35, 30%, 15%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(25, 40%, 12%, 1) 0, transparent 50%),
                radial-gradient(at 0% 100%, hsla(40, 50%, 8%, 1) 0, transparent 50%),
                radial-gradient(at 100% 100%, hsla(30, 25%, 15%, 1) 0, transparent 50%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c0a09;
            background-image: var(--mesh-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            color: #f8fafc;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 28px;
            border: 1px solid rgba(191, 149, 63, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            max-width: 440px;
            width: 100%;
        }

        .brand-header {
            padding: 48px 40px 24px;
            text-align: center;
        }

        .brand-logo-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .brand-subtitle {
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255, 215, 0, 0.4);
        }

        .auth-body {
            padding: 0 40px 40px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: rgba(248, 250, 260, 0.6);
            margin-bottom: 8px;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-right: none;
            color: rgba(255, 215, 0, 0.3);
            border-radius: 14px 0 0 14px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 14px;
            padding: 12px 16px;
            color: #fff;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary-gold);
            box-shadow: 0 0 0 4px rgba(197, 160, 40, 0.15);
            color: #fff;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.02em;
            color: #000;
            box-shadow: 0 10px 15px -3px rgba(191, 149, 63, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(191, 149, 63, 0.3);
            filter: brightness(1.2);
            color: #000;
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .footer-text {
            text-align: center;
            padding: 24px;
            color: rgba(255, 215, 0, 0.2);
            font-size: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .auth-icon {
            width: 70px;
            height: 70px;
            background: rgba(191, 149, 63, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: var(--primary-gold);
            margin: 0 auto 24px;
            border: 1px solid rgba(191, 149, 63, 0.2);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .bg-danger-soft {
            background-color: rgba(220, 53, 69, 0.1) !important;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border-radius: 14px;
            font-size: 14px;
        }

        a {
            color: var(--primary-gold);
            text-decoration: none;
            transition: all 0.2s;
        }

        a:hover {
            color: var(--light-gold);
            text-shadow: 0 0 8px rgba(197, 160, 40, 0.3);
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-header">
                <img src="{% static 'images/logo.jpg' %}" alt="LuckyTech Logo" class="brand-logo-img">
                <div class="brand-logo">LUCKYTECH</div>
                <div class="brand-subtitle">INNOVATION GROUND</div>
            </div>
            <div class="auth-body">
                {% block content %}
                {% endblock %}
            </div>
            <div class="footer-text">
                &copy; {% now "Y" %} LuckyTech Innovation Ground
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
